name: Hailie Ingman
role: Counsel
short_bio: >
  Hailie is a trusted legal advisor to innovative technology and AI
  companies, providing practical, business-oriented legal guidance in
  fast-moving and high-growth environments. Hailie translates complex legal and
  privacy issues into clear, actionable guidance that enables innovation,
  compliance, and sustainable growth.
cta_label: Get in Touch
cta_link: /#contact
image: /assets/img/team/Hailie.jpg
bio: >
  Hailie currently serves as Associate General Counsel at Midjourney, where
  she advises on complex legal, product, intellectual property, public policy,
  and commercial matters at the forefront of artificial intelligence innovation.
  She also serves as Counsel at Open Advising, partnering with fast-growing AI
  companies on commercial strategy, emerging AI regulation, intellectual
  property, and privacy matters.


  Prior to Midjourney, Hailie was the first attorney at MinIO, where she built and scaled core legal operations while advising across product, privacy, and commercial matters. Earlier in her career, she served as commercial counsel at Zscaler, one of the world’s leading cybersecurity companies, where she negotiated high-impact commercial agreements, data center agreements, and helped shape the company’s AI policy framework. 
